version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-lapangan-app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
      - ./public/storage:/var/www/public/storage
    environment:
      - APP_NAME=Booking Lapangan
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://booking.dev-abe.web.id
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=booking_lapangan
      - DB_USERNAME=booking_user
      - DB_PASSWORD=BookingLap2024_!
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booking.rule=Host(`booking.dev-abe.web.id`)"
      - "traefik.http.routers.booking.entrypoints=websecure"
      - "traefik.http.routers.booking.tls=true"
      - "traefik.http.routers.booking.tls.certresolver=letsencrypt"
      - "traefik.http.services.booking.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
    networks:
      - booking-network
      - traefik_net

  mysql:
    image: mysql:8.0
    container_name: booking-lapangan-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=booking_lapangan
      - MYSQL_USER=booking_user
      - MYSQL_PASSWORD=BookingLap2024_!
      - MYSQL_ROOT_PASSWORD=root_password_2024
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - booking-network

networks:
  booking-network:
    driver: bridge
  traefik_net:
    external: true

volumes:
  mysql_data:
  booking-storage:
