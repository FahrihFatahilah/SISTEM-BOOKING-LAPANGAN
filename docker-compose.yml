version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-lapangan-app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/.env
      - booking-storage:/var/www/storage
      - booking-logs:/var/www/storage/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booking.rule=Host(`booking.ffatahilah.my.id`)"
      - "traefik.http.routers.booking.entrypoints=websecure"
      - "traefik.http.routers.booking.tls=true"
      - "traefik.http.routers.booking.tls.certresolver=letsencrypt"
      - "traefik.http.services.booking.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  booking-storage:
    driver: local
  booking-logs:
    driver: local
