version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-lapangan-app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
      - ./public/storage:/var/www/public/storage
    environment:
      - APP_NAME=Booking Lapangan
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=https://booking.ffatahilah.my.id
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=booking_lapangan
      - DB_USERNAME=ffatahilah
      - DB_PASSWORD=OmbaInam#121221
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=database
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booking.rule=Host(`booking.ffatahilah.my.id`)"
      - "traefik.http.routers.booking.entrypoints=websecure"
      - "traefik.http.routers.booking.tls=true"
      - "traefik.http.routers.booking.tls.certresolver=letsencrypt"
      - "traefik.http.services.booking.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_net"
    networks:
      - proxy

networks:
  proxy:
    external: true

volumes:
  booking-storage:
